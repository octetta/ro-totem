name: Release Packages

on:
  push:
    branches: [ main ]
    paths: [ VERSION ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    name: Linux package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            xxd \
            libasound2-dev

      - name: Fetch latest Pulp Skred (Linux)
        run: make pulp-api-linux

      - name: Build Linux package
        run: make linux-package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ro-totem-linux
          path: dist/*.tar.gz
          if-no-files-found: error

  macos:
    name: macOS package
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch latest Pulp Skred (macOS)
        run: make pulp-api-macos

      - name: Build macOS package
        run: make macos-package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ro-totem-macos
          path: "*.zip"
          if-no-files-found: error

  windows:
    name: Windows package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Fetch latest Pulp Skred (Windows)
        run: make pulp-api-windows SKRED_DIST_PLATFORMS=windows-x86_64

      - name: Build Windows package
        run: make windows-package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ro-totem-windows
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [linux, macos, windows]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}   # or read from VERSION file
        run: |
          version="$(cat VERSION | tr -d '[:space:]')"
          tag="v${version// /-}"   # replace spaces with dashes if needed

          gh release create "$tag" release-assets/* \
            --target "$GITHUB_SHA" \
            --title "ro-totem ${version}" \
            --notes "Automated release with latest Pulp Skred."

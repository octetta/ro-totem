name: Release Packages

on:
  push:
    branches:
      - main
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  linux:
    name: Linux package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            xxd

      - name: Build package
        run: make linux-package

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ro-totem-linux
          path: dist/*.tar.gz
          if-no-files-found: error

  macos:
    name: macOS package
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build package
        run: make macos-package

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ro-totem-macos
          path: "*.zip"
          if-no-files-found: error

  release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs:
      - linux
      - macos

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          version_slug="$(printf '%s' "$version" | tr '[:space:]' '-')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version_slug}" >> "$GITHUB_OUTPUT"

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release and upload packages
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --clobber
          else
            gh release create "$TAG" release-assets/* \
              --target "$GITHUB_SHA" \
              --title "ro-totem ${VERSION}" \
              --notes "Automated package release for ro-totem ${VERSION}."
          fi

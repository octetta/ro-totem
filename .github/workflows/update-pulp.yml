name: Update Pulp Skred Vendor

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:     # Allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # Needed for creating PRs

      - name: Fetch latest Pulp Skred for all platforms
        run: make pulp-api-all

      - name: Create Pull Request if changes exist
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update vendored Skred from Pulp"
          title: "chore: update vendored Skred libraries"
          body: |
            Automated update of Pulp Skred API packages.
            Triggered by weekly cron or manual dispatch.
          branch: update-pulp-skred
          delete-branch: true

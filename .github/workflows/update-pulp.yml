name: Update Pulp Skred Vendor

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { token: ${{ secrets.GITHUB_TOKEN }} }  # For PR creation

      - name: Fetch all latest Pulp APIs
        run: make pulp-api-all

      - name: Commit & PR
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add vendor/skred/dist
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update vendored Skred from Pulp $(cat vendor/skred/dist/*/skred-*/include/skred/skred-version.h | grep VERSION | head -1)"
            git push
            # Or use a PR action like peter-evans/create-pull-request
          fi
